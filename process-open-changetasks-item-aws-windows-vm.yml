#############################################################
# Invoked by get-open-changetasks.yml
# Invokes the proper role/playbook based on the open task
#############################################################
- name: Processing open task
  debug:
    msg: "Found change task, number=[{{ snow_open_changetask.number }}], order=[{{ snow_open_changetask.order }}], short_description=[{{ snow_open_changetask.short_description }}], change_request_number=[{{ snow_open_changetask['change_request.number'] }}]"

# Task - CMDB - SLA update
- name: Launch Task - [CMDB - SLA update]
  uri:
    url: "https://{{ aap_host }}/api/v2/job_templates/{{ sonic_job_template_id_task_cmdb_sla_update }}/launch/"
    method: POST
    validate_certs: no
    body: "{{ lookup('template', './extra_vars.json') }}"
    body_format: json
    status_code: 201, 200
    headers:
      Content-Type: application/json
      Authorization: "Bearer {{ aap_token }}"
  when: snow_open_changetask.short_description == snow_changetask_short_description_cmdb_sla_update

